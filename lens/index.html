<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LENS / GLASSBOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bone: #edeae0;
    --ink: #0a0a0a;
    --blue: #1a2bff;
    --mut: #8a8780;
    --b: 2px solid var(--ink);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
  html, body { height: 100%; }
  body {
    background: var(--bone);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', Consolas, monospace;
    font-size: 12px;
    overflow: hidden;
    -webkit-font-smoothing: none;
  }
  button, input { font-family: inherit; color: inherit; }
  ::selection { background: var(--blue); color: #fff; }

  .app { height: 100vh; display: grid; grid-template-columns: minmax(0, 1fr); grid-template-rows: 54px 40px minmax(0, 1fr) 150px; }

  .topbar { display: flex; align-items: stretch; border-bottom: 3px solid var(--ink); background: var(--bone); }
  .brand { background: var(--ink); color: var(--bone); display: flex; align-items: center; gap: 9px; padding: 0 20px; border-right: var(--b); }
  .brand .nm { font-weight: 800; font-size: 24px; letter-spacing: -1.5px; }
  .brand .tag { color: var(--blue); font-size: 10px; font-weight: 700; letter-spacing: 0.5px; }
  .prompt { flex: 1; border: none; background: var(--bone); font-size: 15px; font-weight: 500; padding: 0 16px; outline: none; letter-spacing: -0.3px; }
  .prompt::placeholder { color: var(--mut); }
  .sys { display: flex; align-items: center; padding: 0 16px; border-left: var(--b); font-size: 10px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
  .sys b { color: var(--blue); }
  .run { background: var(--ink); color: var(--bone); border: none; border-left: var(--b); padding: 0 28px; font-size: 15px; font-weight: 800; letter-spacing: 1.5px; cursor: pointer; }
  .run:hover { background: var(--blue); color: #fff; }

  .tokrow { display: flex; align-items: stretch; border-bottom: var(--b); overflow-x: auto; overflow-y: hidden; background: var(--bone); }
  .tokrow::-webkit-scrollbar { height: 0; }
  .tokrow .tl { display: flex; align-items: center; padding: 0 12px; border-right: var(--b); font-weight: 800; font-size: 11px; letter-spacing: 1px; background: var(--ink); color: var(--bone); white-space: nowrap; }
  .tok { display: flex; align-items: center; padding: 0 11px; border-right: var(--b); white-space: pre; font-size: 13px; font-weight: 500; cursor: pointer; }
  .tok:hover { background: var(--ink); color: var(--bone); }
  .tok.sel { background: var(--blue); color: #fff; font-weight: 700; }
  .tok .ix { font-size: 8px; color: var(--mut); margin-left: 5px; }
  .tok.sel .ix, .tok:hover .ix { color: rgba(255,255,255,0.6); }
  .nexttok { display: flex; align-items: center; gap: 7px; margin-left: auto; padding: 0 14px; border-left: var(--b); white-space: nowrap; font-size: 11px; font-weight: 700; }
  .nexttok b { background: var(--blue); color: #fff; padding: 2px 6px; }

  .main { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); grid-template-rows: minmax(0, 1fr) minmax(0, 1fr); min-height: 0; }
  .panel { display: flex; flex-direction: column; border-right: var(--b); border-bottom: var(--b); min-width: 0; min-height: 0; position: relative; background: var(--bone); }
  .panel.active { outline: 3px solid var(--ink); outline-offset: -3px; z-index: 2; }
  .phead { display: flex; align-items: center; justify-content: space-between; gap: 8px; border-bottom: var(--b); padding: 5px 10px; min-height: 28px; background: var(--bone); }
  .panel.active .phead { background: var(--ink); color: var(--bone); }
  .phead .ttl { font-weight: 800; font-size: 12px; letter-spacing: 1.5px; }
  .phead .meta { font-size: 10px; font-weight: 700; color: var(--mut); letter-spacing: 0.5px; }
  .panel.active .phead .meta { color: var(--bone); }
  .pbody { flex: 1; min-height: 0; min-width: 0; padding: 7px; display: flex; }
  .pbody svg { width: 100%; height: 100%; display: block; }

  .stepper { display: inline-flex; align-items: stretch; border: var(--b); }
  .stepper button { background: var(--bone); border: none; border-right: var(--b); width: 18px; cursor: pointer; font-size: 11px; font-weight: 800; line-height: 1; }
  .stepper button:last-child { border-right: none; border-left: var(--b); }
  .stepper button:hover { background: var(--blue); color: #fff; }
  .stepper .v { display: flex; align-items: center; padding: 0 8px; font-weight: 800; font-size: 11px; letter-spacing: 0.5px; }

  .ax { stroke: var(--ink); stroke-width: 1.4; }
  .gl { stroke: var(--ink); stroke-width: 0.4; }
  .axt { font-family: 'JetBrains Mono', monospace; font-weight: 600; fill: var(--ink); }
  .axl { font-family: 'JetBrains Mono', monospace; font-weight: 700; fill: var(--mut); }

  .ph { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--mut); font-weight: 700; letter-spacing: 1.5px; font-size: 12px; }
  .ph.live { color: var(--blue); }

  .metricbar { display: flex; align-items: stretch; border-top: var(--b); }
  .metricbar .mcell { flex: 1; padding: 5px 10px; border-right: var(--b); }
  .metricbar .mcell:last-child { border-right: none; }
  .metricbar .ml { font-size: 9px; font-weight: 700; letter-spacing: 1px; color: var(--mut); }
  .metricbar .mv { font-size: 21px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; }
  .metricbar .mv.blue { color: var(--blue); }

  .legend { display: flex; flex-wrap: wrap; gap: 5px; padding: 5px 8px 0; }
  .ltag { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; border: var(--b); padding: 1px 5px; cursor: pointer; background: var(--bone); }
  .ltag.on { background: var(--blue); color: #fff; border-color: var(--blue); }
  .ltag .dot { display: inline-block; width: 7px; height: 7px; margin-right: 4px; vertical-align: middle; }

  .neurons { display: flex; flex-direction: column; min-height: 0; background: var(--bone); }
  .nhead { display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: var(--b); padding: 5px 10px; }
  .nhead .ttl { font-weight: 800; font-size: 12px; letter-spacing: 1.5px; }
  .nhead .right { display: flex; align-items: center; gap: 10px; font-size: 10px; font-weight: 700; color: var(--mut); }
  .nlist { flex: 1; display: flex; overflow-x: auto; overflow-y: hidden; }
  .nlist::-webkit-scrollbar { height: 6px; }
  .nlist::-webkit-scrollbar-thumb { background: var(--ink); }
  .ncard { flex: 0 0 262px; border-right: var(--b); padding: 7px 9px; cursor: pointer; display: flex; flex-direction: column; gap: 5px; overflow: hidden; }
  .ncard:hover { background: #e3e0d6; }
  .ncard.sel { outline: 3px solid var(--blue); outline-offset: -3px; }
  .ncard .nh { display: flex; justify-content: space-between; font-weight: 800; font-size: 12px; letter-spacing: 0.5px; }
  .ncard .nh .act { color: var(--blue); }
  .ncard .snip { font-size: 11px; line-height: 1.55; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tk { white-space: pre; }
  .tk.mx { background: var(--blue); color: #fff; font-weight: 700; }
  .err { color: var(--blue); font-weight: 700; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><span class="nm">LENS</span><span class="tag">[GLASSBOX]</span></div>
    <input class="prompt" id="prompt" value="The cat sat on the mat" spellcheck="false" placeholder="ENTER PROMPT..." />
    <div class="sys" id="sys">GPT-2 / <b>--</b></div>
    <button class="run" id="run">RUN &#9654;</button>
  </div>

  <div class="tokrow" id="tokrow"><div class="tl">TOKENS /</div></div>

  <div class="main">
    <div class="panel" data-p="attn">
      <div class="phead">
        <span class="ttl">ATTENTION</span>
        <span class="ctrls">
          <span class="stepper" id="step-l"><button data-d="-1">&#9664;</button><span class="v" id="v-l">L00</span><button data-d="1">&#9654;</button></span>
          <span class="stepper" id="step-h" style="margin-left:6px"><button data-d="-1">&#9664;</button><span class="v" id="v-h">H00</span><button data-d="1">&#9654;</button></span>
        </span>
      </div>
      <div class="pbody"><div class="ph">[ AWAITING RUN ]</div></div>
    </div>

    <div class="panel" data-p="resid">
      <div class="phead"><span class="ttl">RESIDUAL STREAM</span><span class="meta" id="m-resid">PCA / RESID_POST</span></div>
      <div class="pbody"><div class="ph">[ AWAITING RUN ]</div></div>
    </div>

    <div class="panel" data-p="probe">
      <div class="phead"><span class="ttl">PROBE ACCURACY</span><span class="meta">LOGREG / LAYER 0-11</span></div>
      <div id="probe-legend" class="legend"></div>
      <div class="pbody"><div class="ph">[ COMPUTING... ]</div></div>
    </div>

    <div class="panel" data-p="patch">
      <div class="phead"><span class="ttl">ACTIVATION PATCHING</span><span class="meta" id="m-patch">RESID_PRE / CAUSAL SWEEP</span></div>
      <div class="pbody"><div class="ph">[ COMPUTING... ]</div></div>
      <div class="metricbar" id="patch-metric"></div>
    </div>
  </div>

  <div class="neurons">
    <div class="nhead">
      <span class="ttl">NEURON EXPLORER</span>
      <span class="right">
        <span id="n-info">MLP_POST</span>
        <span class="stepper" id="step-n"><button data-d="-1">&#9664;</button><span class="v" id="v-n">LAYER 00</span><button data-d="1">&#9654;</button></span>
      </span>
    </div>
    <div class="nlist" id="nlist"><div class="ph" style="padding:0 12px">[ SCANNING... ]</div></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
const S = { fwd:null, traj:null, probe:null, patch:null, neu:null, focus:null, aL:0, aH:0, nL:0, probeOff:new Set(), active:null };
const $ = (s) => document.querySelector(s);
const BONE=[237,234,224], BLUE=[26,43,255], INK=[10,10,10];
const PAL = ['#1a2bff','#0a0a0a','#8a8780','#5a23ff'];

function mix(a,b,t){ t=Math.max(0,Math.min(1,t)); return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`; }
function cleanTok(t){ if(t==='<|endoftext|>') return '⟨BOS⟩'; if(t==='') return '∅'; return t.replace(/\n/g,'↵'); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function short(t,n){ t=cleanTok(t); return t.length>n? t.slice(0,n) : t; }
function pad2(n){ return String(n).padStart(2,'0'); }

async function rfetch(u,o){ let last; for(let a=0;a<4;a++){ try{ return await fetch(u,o); }catch(e){ last=e; await new Promise(r=>setTimeout(r,350)); } } throw last; }
async function post(p,b){ const r=await rfetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}); if(!r.ok){ let d=r.statusText; try{ d=(await r.json()).detail||d; }catch(e){} throw new Error(d); } return r.json(); }
async function get(p){ const r=await rfetch(API+p); if(!r.ok) throw new Error(r.statusText); return r.json(); }

function pbody(p){ return document.querySelector(`[data-p="${p}"] .pbody`); }
function setPh(p,txt,live){ pbody(p).innerHTML = `<div class="ph${live?' live':''}">${esc(txt||'')}</div>`; }
function draw(p,svg){ pbody(p).innerHTML = svg; }

function renderTokens(){
  const row=$('#tokrow');
  row.innerHTML = '<div class="tl">TOKENS /</div>';
  if(!S.fwd) return;
  S.fwd.tokens.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='tok'+(S.focus===i?' sel':'');
    d.innerHTML = esc(cleanTok(t)) + `<span class="ix">${i}</span>`;
    d.onclick=()=>{ S.focus = S.focus===i? null : i; renderTokens(); renderAttn(); renderResid(); };
    row.appendChild(d);
  });
  const p=S.fwd.top_predictions[0];
  const nx=document.createElement('div');
  nx.className='nexttok';
  nx.innerHTML = `NEXT &#8594; <b>${esc(cleanTok(p.token))}</b> ${p.prob.toFixed(3)}`;
  row.appendChild(nx);
}

function renderAttn(){
  $('#v-l').textContent = 'L'+pad2(S.aL);
  $('#v-h').textContent = 'H'+pad2(S.aH);
  if(!S.fwd){ setPh('attn','[ AWAITING RUN ]'); return; }
  const m=S.fwd.attention[S.aL][S.aH], n=S.fwd.tokens.length, toks=S.fwd.tokens.map(t=>short(t,5));
  const cell=12, lab=46, pad=3, W=lab+n*cell+pad, H=lab+n*cell+pad, fs=Math.min(6, 64/n);
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  for(let c=0;c<n;c++){ const x=lab+c*cell+cell*0.62; s+=`<text class="axt" font-size="${fs}" x="${x}" y="${lab-3}" transform="rotate(-90 ${x} ${lab-3})" text-anchor="start">${esc(toks[c])}</text>`; }
  for(let r=0;r<n;r++){ s+=`<text class="axt" font-size="${fs}" x="${lab-3}" y="${lab+r*cell+cell*0.7}" text-anchor="end">${esc(toks[r])}</text>`; }
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){ const v=m[r][c]; const f = c>r ? 'var(--bone)' : mix(BONE,BLUE,Math.pow(v,0.7)); s+=`<rect x="${lab+c*cell}" y="${lab+r*cell}" width="${cell}" height="${cell}" fill="${f}" class="gl"/>`; }
  if(S.focus!=null && S.focus<n){ const i=S.focus;
    s+=`<rect x="${lab}" y="${lab+i*cell}" width="${n*cell}" height="${cell}" fill="none" stroke="var(--blue)" stroke-width="1.6"/>`;
    s+=`<rect x="${lab+i*cell}" y="${lab}" width="${cell}" height="${n*cell}" fill="none" stroke="var(--blue)" stroke-width="1.6"/>`;
  }
  s+='</svg>';
  draw('attn', s);
}

function renderResid(){
  if(!S.traj){ setPh('resid','[ AWAITING RUN ]'); return; }
  const tr=S.traj.trajectories, toks=S.traj.tokens;
  let mnx=1e9,mxx=-1e9,mny=1e9,mxy=-1e9;
  tr.forEach(p=>p.forEach(([x,y])=>{ if(x<mnx)mnx=x; if(x>mxx)mxx=x; if(y<mny)mny=y; if(y>mxy)mxy=y; }));
  const W=240,H=180,pad=16;
  const sx=x=>pad+(x-mnx)/((mxx-mnx)||1)*(W-2*pad);
  const sy=y=>H-pad-(y-mny)/((mxy-mny)||1)*(H-2*pad);
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  s+=`<line class="ax" x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}"/><line class="ax" x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}"/>`;
  s+=`<text class="axl" font-size="6" x="${W-pad}" y="${H-pad+8}" text-anchor="end">PC1</text><text class="axl" font-size="6" x="${pad-1}" y="${pad+1}" text-anchor="start">PC2</text>`;
  tr.forEach((p,ti)=>{
    const foc = S.focus===ti, col = foc? 'var(--blue)' : 'var(--ink)', op = (foc||S.focus==null)?1:0.22;
    s+=`<polyline points="${p.map(([x,y])=>`${sx(x)},${sy(y)}`).join(' ')}" fill="none" stroke="${col}" stroke-width="${foc?1.4:0.5}" opacity="${op}"/>`;
    p.forEach(([x,y],pi)=>{ const last=pi===p.length-1, sz=last?3.2:2; s+=`<rect x="${sx(x)-sz/2}" y="${sy(y)-sz/2}" width="${sz}" height="${sz}" fill="${col}" opacity="${op}"/>`; });
    if(foc){ const e=p[p.length-1]; s+=`<text class="axt" font-size="7" x="${sx(e[0])+4}" y="${sy(e[1])+2}" fill="var(--blue)">${esc(short(toks[ti],6))}</text>`; }
  });
  s+='</svg>';
  draw('resid', s);
  const ev=S.traj.explained_variance;
  $('#m-resid').textContent = `PC1 ${(ev[0]*100).toFixed(0)}% / PC2 ${(ev[1]*100).toFixed(0)}%`;
}

function renderProbe(){
  const leg=$('#probe-legend');
  if(!S.probe){ leg.innerHTML=''; return; }
  const res=S.probe.results, n=S.probe.n_layers;
  leg.innerHTML = res.map((r,i)=>`<span class="ltag ${S.probeOff.has(r.key)?'':'on'}" data-k="${r.key}"><span class="dot" style="background:${PAL[i%PAL.length]}"></span>${esc(r.key.toUpperCase())}</span>`).join('');
  leg.querySelectorAll('.ltag').forEach(t=>t.onclick=()=>{ const k=t.dataset.k; if(S.probeOff.has(k)) S.probeOff.delete(k); else S.probeOff.add(k); renderProbe(); });
  const W=260,H=150,L=22,B=16,T=6,R=6;
  const px=i=>L+i/(n-1)*(W-L-R), py=v=>T+(1-v)*(H-T-B);
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  [0,0.5,1].forEach(v=>{ s+=`<line class="gl" x1="${L}" y1="${py(v)}" x2="${W-R}" y2="${py(v)}"/><text class="axl" font-size="6" x="${L-3}" y="${py(v)+2}" text-anchor="end">${v.toFixed(1)}</text>`; });
  s+=`<line class="ax" x1="${L}" y1="${T}" x2="${L}" y2="${H-B}"/><line class="ax" x1="${L}" y1="${H-B}" x2="${W-R}" y2="${H-B}"/>`;
  for(let i=0;i<n;i+=2){ s+=`<text class="axl" font-size="6" x="${px(i)}" y="${H-B+8}" text-anchor="middle">${i}</text>`; }
  s+=`<line x1="${L}" y1="${py(0.5)}" x2="${W-R}" y2="${py(0.5)}" stroke="var(--ink)" stroke-width="0.4" stroke-dasharray="3 2"/>`;
  res.forEach((r,i)=>{
    if(S.probeOff.has(r.key)) return;
    const col=PAL[i%PAL.length]; let pts=[];
    r.test_acc.forEach((v,j)=>{ pts.push([px(j),py(v)]); if(j<n-1) pts.push([px(j+1),py(v)]); });
    s+=`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="${col}" stroke-width="${i===0?1.7:0.9}"/>`;
    r.test_acc.forEach((v,j)=>{ s+=`<rect x="${px(j)-1}" y="${py(v)-1}" width="2" height="2" fill="${col}"/>`; });
  });
  s+='</svg>';
  draw('probe', s);
}

function renderPatch(){
  if(!S.patch) return;
  const p=S.patch, sc=p.scores, nl=sc.length, np=sc[0].length, toks=p.tokens.map(t=>short(t,5));
  let amax=1e-6; sc.forEach(row=>row.forEach(v=>{ if(Math.abs(v)>amax) amax=Math.abs(v); }));
  let best=-1e9,bl=0,bp=0;
  for(let l=0;l<nl;l++)for(let q=0;q<np;q++){ if(sc[l][q]>best){best=sc[l][q];bl=l;bp=q;} }
  const cell=14, lab=42, top=16, pad=3, W=lab+np*cell+pad, H=top+nl*cell+pad;
  let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
  for(let q=0;q<np;q++){ const x=lab+q*cell+cell*0.62; s+=`<text class="axt" font-size="6" x="${x}" y="${top-2}" transform="rotate(-90 ${x} ${top-2})" text-anchor="start">${esc(toks[q])}</text>`; }
  for(let l=0;l<nl;l++){ s+=`<text class="axt" font-size="6" x="${lab-3}" y="${top+l*cell+cell*0.7}" text-anchor="end">L${l}</text>`; }
  for(let l=0;l<nl;l++)for(let q=0;q<np;q++){ const v=sc[l][q]; const f = v>=0 ? mix(BONE,BLUE,v/amax) : mix(BONE,INK,-v/amax); s+=`<rect x="${lab+q*cell}" y="${top+l*cell}" width="${cell}" height="${cell}" fill="${f}" class="gl"/>`; }
  s+=`<rect x="${lab+bp*cell}" y="${top+bl*cell}" width="${cell}" height="${cell}" fill="none" stroke="var(--blue)" stroke-width="1.8"/></svg>`;
  draw('patch', s);
  $('#patch-metric').innerHTML =
    `<div class="mcell"><div class="ml">CLEAN Δ</div><div class="mv">${p.logit_diff_clean>=0?'+':''}${p.logit_diff_clean.toFixed(2)}</div></div>`+
    `<div class="mcell"><div class="ml">CORRUPT Δ</div><div class="mv">${p.logit_diff_corrupted>=0?'+':''}${p.logit_diff_corrupted.toFixed(2)}</div></div>`+
    `<div class="mcell"><div class="ml">MAX RESTORE</div><div class="mv blue">${best.toFixed(2)}</div></div>`+
    `<div class="mcell"><div class="ml">SITE</div><div class="mv">L${bl}.P${bp}</div></div>`;
  $('#m-patch').textContent = `${cleanTok(p.answer).trim().toUpperCase()} − ${cleanTok(p.corrupted_answer).trim().toUpperCase()}`;
}

function renderNeurons(){
  $('#v-n').textContent = 'LAYER '+pad2(S.nL);
  const list=$('#nlist');
  if(!S.neu){ list.innerHTML='<div class="ph" style="padding:0 12px">[ SCANNING... ]</div>'; return; }
  $('#n-info').textContent = `MLP_POST / ${S.neu.n_sentences} SEQ / ${S.neu.d_mlp} N`;
  list.innerHTML = S.neu.neurons.map((nn,i)=>{
    const ctx=nn.contexts[0];
    const snip = ctx.tokens.map((t,j)=>`<span class="tk${j===ctx.max_pos?' mx':''}">${esc(cleanTok(t))}</span>`).join('');
    return `<div class="ncard${S.neu.sel===nn.index?' sel':''}" data-i="${i}"><div class="nh"><span>L${S.neu.layer}.N${nn.index}</span><span class="act">${nn.max_act.toFixed(2)}</span></div><div class="snip">${snip}</div></div>`;
  }).join('');
  list.querySelectorAll('.ncard').forEach(c=>c.onclick=()=>{ const nn=S.neu.neurons[+c.dataset.i]; S.neu.sel = S.neu.sel===nn.index? null : nn.index; renderNeurons(); });
}

function setActive(p){ S.active=p; document.querySelectorAll('.panel').forEach(el=>el.classList.toggle('active', el.dataset.p===p)); }

async function runPrompt(){
  const prompt=$('#prompt').value.trim(); if(!prompt) return;
  S.focus=null; S.aL=0; S.aH=0;
  setPh('attn','[ COMPUTING... ]', true); setPh('resid','[ COMPUTING... ]', true);
  try{
    const [f,t] = await Promise.all([ post('/forward',{prompt,top_k:10}), post('/trajectory',{prompt}) ]);
    S.fwd=f; S.traj=t; renderTokens(); renderAttn(); renderResid();
  }catch(e){ setPh('attn','[ ERR '+e.message+' ]'); setPh('resid','[ ERR ]'); }
}
async function loadProbe(){ try{ S.probe=await post('/probe',{concepts:[]}); renderProbe(); }catch(e){ setPh('probe','[ ERR ]'); } }
async function loadPatch(){ try{ S.patch=await post('/patch',{clean_prompt:'The capital of France is',corrupted_prompt:'The capital of England is',answer:' Paris',corrupted_answer:' London'}); renderPatch(); }catch(e){ setPh('patch','[ ERR ]'); } }
async function loadNeurons(l){ S.nL=l; $('#v-n').textContent='LAYER '+pad2(l); $('#nlist').innerHTML='<div class="ph live" style="padding:0 12px">[ SCANNING L'+l+'... ]</div>'; try{ S.neu=await get('/neuron/scan?layer='+l); renderNeurons(); }catch(e){ $('#nlist').innerHTML='<div class="ph" style="padding:0 12px">[ ERR ]</div>'; } }

$('#run').onclick=runPrompt;
$('#prompt').addEventListener('keydown',e=>{ if(e.key==='Enter') runPrompt(); });
$('#step-l').querySelectorAll('button').forEach(b=>b.onclick=()=>{ if(!S.fwd)return; S.aL=(S.aL+ +b.dataset.d+S.fwd.n_layers)%S.fwd.n_layers; renderAttn(); });
$('#step-h').querySelectorAll('button').forEach(b=>b.onclick=()=>{ if(!S.fwd)return; S.aH=(S.aH+ +b.dataset.d+S.fwd.n_heads)%S.fwd.n_heads; renderAttn(); });
$('#step-n').querySelectorAll('button').forEach(b=>b.onclick=()=>{ loadNeurons((S.nL+ +b.dataset.d+12)%12); });
document.querySelectorAll('.panel').forEach(el=>el.addEventListener('click',()=>setActive(el.dataset.p)));

async function init(){
  setActive('attn');
  try{ const h=await get('/health'); $('#sys').innerHTML=`${h.model.toUpperCase()} / <b>${h.n_layers}L·${h.n_heads}H·D${h.d_model}</b>`; }catch(e){ $('#sys').innerHTML='<b class="err">BACKEND OFFLINE</b>'; }
  await runPrompt();
  await loadPatch();
  await loadNeurons(0);
  await loadProbe();
}
init();
</script>
</body>
</html>
