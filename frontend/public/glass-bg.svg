<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc77f"/>
      <stop offset=".5" stop-color="#ff8c3f"/>
      <stop offset="1" stop-color="#b8390f"/>
    </linearGradient>
    <linearGradient id="b" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9d4d"/>
      <stop offset="1" stop-color="#551808"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffe6bd" stop-opacity=".85"/>
      <stop offset=".45" stop-color="#ff9d4d" stop-opacity=".32"/>
      <stop offset="1" stop-color="#ff9d4d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx=".64" cy=".28" r=".85">
      <stop offset=".38" stop-color="#0a0b0f" stop-opacity="0"/>
      <stop offset="1" stop-color="#070709" stop-opacity=".92"/>
    </radialGradient>
    <filter id="warp" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.010" numOctaves="4" seed="9" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="250" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="85"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="#0a0b0f"/>
  <g filter="url(#warp)">
    <ellipse cx="1210" cy="90" rx="650" ry="480" fill="url(#a)" opacity=".92"/>
    <ellipse cx="240" cy="910" rx="560" ry="450" fill="url(#b)" opacity=".78"/>
    <ellipse cx="840" cy="1090" rx="740" ry="390" fill="#d85a26" opacity=".5"/>
    <ellipse cx="1500" cy="640" rx="360" ry="540" fill="#ff8a3d" opacity=".42"/>
  </g>
  <ellipse cx="1370" cy="10" rx="780" ry="660" fill="url(#glow)" filter="url(#soft)"/>
  <rect width="1600" height="1000" fill="url(#vig)"/>
</svg>
